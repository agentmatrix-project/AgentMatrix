apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  namespace: agents
  labels:
    app.kubernetes.io/name: demo-server
    app.kubernetes.io/part-of: agent-matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-server
        app.kubernetes.io/part-of: agent-matrix
    spec:
      containers:
        - name: demo-server
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              python -u - <<'PY'
              import json
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def do_POST(self):
                      length = int(self.headers.get('content-length', '0'))
                      body = self.rfile.read(length) if length else b''
                      try:
                          decoded = body.decode('utf-8')
                      except UnicodeDecodeError:
                          decoded = body.decode('utf-8', errors='replace')
                      print(f"received {self.command} {self.path} body={decoded}")
                      self.send_response(200)
                      self.send_header('content-type', 'application/json')
                      self.end_headers()
                      response = json.dumps({"status": "ok", "bytes": length}).encode('utf-8')
                      self.wfile.write(response)

                  def log_message(self, format, *args):
                      return

              HTTPServer(('', 8080), Handler).serve_forever()
              PY
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-server
  namespace: agents
  labels:
    app.kubernetes.io/name: demo-server
    app.kubernetes.io/part-of: agent-matrix
spec:
  selector:
    app.kubernetes.io/name: demo-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
