apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-b
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-b
    app.kubernetes.io/part-of: agent-matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-b
        app.kubernetes.io/part-of: agent-matrix
    spec:
      containers:
        - name: agent-b
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              while true; do
                curl -sS -X POST http://agent-a.agents.svc.cluster.local:8080/ \
                  -H 'content-type: text/plain' \
                  -d 'hello from agent-b';
                sleep 2;
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
