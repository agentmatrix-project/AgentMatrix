apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-a
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-a
    app.kubernetes.io/part-of: agent-matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-a
        app.kubernetes.io/part-of: agent-matrix
    spec:
      containers:
        - name: agent-a
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=hello from agent-a"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-a
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-a
    app.kubernetes.io/part-of: agent-matrix
spec:
  selector:
    app.kubernetes.io/name: agent-a
  ports:
    - name: http
      port: 8080
      targetPort: 8080
